<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transportes Quality Carga</title>
    <style>
        :root {
            --primary: #4a148c; 
            --secondary: #25D366; 
            --light: #f4f4f9;
            --dark: #333;
            --white: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--light);
        }

        header {
            background: linear-gradient(135deg, var(--primary), #7c43bd);
            color: var(--white);
            padding: 3rem 1rem;
            text-align: center;
            position: relative;
        }

        /* Foto de perfil en la esquina superior izquierda */
        .profile-img-corner {
            position: absolute;
            top: 15px;
            left: 15px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid var(--white);
            object-fit: cover;
        }

        .container {
            max-width: 850px;
            margin: -2rem auto 2rem;
            background: var(--white);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        /* Imagen del camión en el centro */
        .truck-center {
            width: 100%;
            max-width: 500px;
            height: auto;
            margin: 1rem auto;
            display: block;
        }

        .status {
            color: #00c853;
            font-weight: bold;
            margin-bottom: 1rem;
            display: block;
        }

        .btn-whatsapp {
            background-color: var(--secondary);
            color: white;
            padding: 1rem 2.5rem;
            text-decoration: none;
            font-size: 1.2rem;
            border-radius: 50px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            margin-top: 1.5rem;
            transition: 0.3s;
        }

        .btn-whatsapp:hover {
            transform: scale(1.05);
            background-color: #1ebe58;
        }

        .services {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }

        .card {
            background: #f8f9fa;
            padding: 1.2rem;
            border-radius: 8px;
            border-bottom: 4px solid var(--primary);
        }

        footer { text-align: center; padding: 2rem; color: #888; }
    </style>
</head>
<body>

    <header>
        <img src="edgar.png" alt="Edgar" class="profile-img-corner">
        <h1>Transportes Quality Carga</h1>
        <p>~Servicio Express 24 Horas</p>
    </header>

    <div class="container">
        <img src="edgar1.png" alt="Camión Quality" class="truck-center">

        <span class="status">● Abierto ahora - Disponibilidad Total</span>
        
        <h2>Nuestros Servicios</h2>
        <div class="services">
            <div class="card"><h3>Mudanzas</h3></div>
            <div class="card"><h3>Fletes</h3></div>
            <div class="card"><h3>Carga Pesada</h3></div>
        </div>

        <div style="margin-top: 2rem;">
            <h3>¿Necesitas un flete ahora?</h3>
            <p>Escríbenos directamente al WhatsApp de Edgar:</p>
            <a href="https://wa.me/593996086109?text=Hola,%20necesito%20información%20sobre%20un%20transporte" class="btn-whatsapp">
                Enviar WhatsApp
            </a>
            <p style="margin-top: 1rem; font-weight: bold;">Telf: 099 608 6109</p>
        </div>
    </div>

    <footer>
        &copy; 2026 Transportes Quality Carga | Edgar
    </footer>

</body>
</html>
