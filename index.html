<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transportes Quality Carga - Edgar</title>
    <style>
        /* Paleta de colores basada en el modelo */
        :root {
            --primary-purple: #4a148c; /* Morado intenso de la cabecera */
            --status-green: #00c853;    /* Verde para el estado y botones */
            --bg-light: #f3f0f7;       /* Fondo gris lila muy suave */
            --white: #ffffff;
            --text-dark: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* Contenedor principal para centrar la página estilo "tarjeta" */
        .page-container {
            max-width: 900px;
            margin: 2rem auto;
            background-color: var(--white);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden; /* Para asegurar bordes redondeados */
        }

        /* HEADER: Fondo morado con foto de perfil en la esquina */
        header {
            background-color: var(--primary-purple);
            color: var(--white);
            padding: 2rem;
            position: relative;
            text-align: center;
        }

        /* Foto de perfil de Edgar en la esquina superior izquierda */
        .profile-img-corner {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.8);
            object-fit: cover;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        header h1 {
            margin: 1.5rem 0 0.5rem 0;
            font-size: 2.2rem;
            font-weight: 700;
        }

        /* Sección del camión grande central */
        .truck-center-container {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 2rem 0;
            background-color: var(--white);
        }

        .truck-center-img {
            max-width: 90%;
            height: auto;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
        }

        /* CONTENIDO PRINCIPAL */
        .main-content {
            padding: 0 2rem 2rem 2rem;
            text-align: center;
        }

        /* Indicador de estado (Abierto) */
        .status-badge {
            display: inline-flex;
            align-items: center;
            color: var(--status-green);
            font-weight: bold;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .status-badge::before {
            content: '';
            display: inline-block;
            width: 10px;
            height: 10px;
            background-color: var(--status-green);
            border-radius: 50%;
            margin-right: 8px;
        }

        h2.services-title {
            color: var(--primary-purple);
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 1.5rem;
        }

        /* Grid de Servicios */
        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 3rem;
        }

        .service-card {
            background-color: #f7f3ff;
            padding: 1.5rem;
            border-radius: 10px;
            border-bottom: 5px solid var(--primary-purple);
            transition: transform 0.2s ease;
        }

        .service-card:hover {
            transform: translateY(-5px);
        }

        .service-card h3 {
            color: var(--primary-purple);
            margin: 0;
            font-size: 1.3rem;
        }

        /* SECCIÓN DE LLAMADO A LA ACCIÓN (WhatsApp) */
        .cta-section {
            padding: 2rem 0;
        }

        .cta-section h3 {
            font-size: 1.4rem;
            margin-top: 0;
        }

        .cta-section p {
            color: #666;
            margin-bottom: 1.5rem;
        }

        .btn-whatsapp {
            background-color: var(--status-green);
            color: var(--white);
            padding: 1rem 2rem;
            text-decoration: none;
            font-size: 1.1rem;
            border-radius: 50px;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            transition: background-color 0.3s ease;
            box-shadow: 0 4px 10px rgba(0, 200, 83, 0.3);
        }

        .btn-whatsapp:hover {
            background-color: #00a846;
        }

        /* Teléfono */
        .phone-display {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-dark);
            margin-top: 1.5rem;
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 2rem;
            color: #888;
            font-size: 0.9rem;
            border-top: 1px solid #eee;
        }

        /* Responsive para móviles */
        @media (max-width: 600px) {
            .profile-img-corner { width: 60px; height: 60px; top: 10px; left: 10px; }
            header h1 { font-size: 1.8rem; margin-top: 2rem; }
            .truck-center-img { max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="page-container">
        
        <header>
            <img src="edgar.png" alt="Foto de Edgar" class="profile-img-corner">
            <h1>Transportes Quality Carga</h1>
        </header>

        <div class="truck-center-container">
            <img src="edgar1.png" alt="Camión de Carga Trans Quality" class="truck-center-img">
        </div>

        <div class="main-content">
            
            <div class="status-badge">
                Abierto ahora - Disponibilidad Total
            </div>

            <h2 class="services-title">Nuestros Servicios</h2>

            <div class="services-grid">
                <div class="service-card">
                    <h3>Mudanzas</h3>
                </div>
                
                <div class="service-card">
                    <h3>Fletes</h3>
                </div>
                
                <div class="service-card">
                    <h3>Carga Pesada</h3>
                </div>
            </div>

            <div class="cta-section">
                <h3>¿Necesitas un flete ahora?</h3>
                <p>Escríbenos directamente al WhatsApp de Edgar:</p>
                
                <a href="https://wa.me/593996086109?text=Hola%20Edgar,%20necesito%20una%20cotización%20para%20un%20servicio%20de%20transporte." class="btn-whatsapp" target="_blank">
                    Enviar WhatsApp
                </a>

                <div class="phone-display">Telf: 099 608 6109</div>
            </div>

        </div>

        <footer>
            &copy; 2026 Transportes Quality Carga | Edgar. Todos los derechos reservados.
        </footer>

    </div>

</body>
</html>
